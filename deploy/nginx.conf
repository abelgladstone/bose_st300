# Reverse proxy mounting the SoundTouch app at /bose so the port stays hidden:
#   http://<host>/bose  ->  bose-st300 container :5001
#
# This server owns port 80 in the bundled compose. If the target host already runs a
# reverse proxy on :80, do not use this file -- copy the `location /bose/` block into
# that proxy instead (see deploy/README-deploy.md).

server {
    listen 80;
    server_name _;

    # Keep redirects relative so the Host's port survives (e.g. when fronted on :8080).
    absolute_redirect off;

    # Bare /bose -> /bose/ so relative asset URLs resolve correctly.
    location = /bose {
        return 301 /bose/;
    }

    location /bose/ {
        # Trailing slash strips the /bose prefix; the app re-adds it from the header below.
        proxy_pass http://app:5001/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Tells the app it is mounted under /bose (drives url_for + the JS base path).
        proxy_set_header X-Forwarded-Prefix /bose;

        # Server-Sent Events (/bose/api/events): stream immediately, never time out.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding on;
    }
}
