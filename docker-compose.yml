# Two services: the app container and an nginx reverse proxy that exposes it at /bose.
# Reach it at http://<host>/bose after `docker compose up -d`.
#
# The app must run on a host that can reach the speaker's IP. If the speaker is on a
# different subnet/VLAN than this host, deployment will start but control nothing --
# see deploy/README-deploy.md.

services:
  app:
    build: .
    image: bose-st300:latest
    restart: unless-stopped
    environment:
      # Configure these in .env (see .env.example). BOSE_HOST is required.
      BOSE_HOST: "${BOSE_HOST:?set BOSE_HOST in .env — your SoundTouch's IP or hostname}"
      BOSE_NAME: "${BOSE_NAME:-SoundTouch}"
    # No published port: only nginx talks to it, over the internal compose network.
    expose:
      - "5001"

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${PROXY_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
